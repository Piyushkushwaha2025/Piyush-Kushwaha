<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Piyush Kushwaha — Digital Innovator</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // This handles direct navigation to routes like /about, /portfolio etc.
      // by redirecting back to index.html with the path stored in sessionStorage
      var pathSegmentsToKeep = 1; // Keep /Piyush-Kushwaha/ prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
